services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: applizor-postgres
    restart: always
    environment:
      POSTGRES_USER: applizor
      POSTGRES_PASSWORD: ${DB_PASSWORD:-applizor123}
      POSTGRES_DB: applizor_erp
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U applizor -d applizor_erp" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - applizor-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    image: applizor-backend-prod:latest
    container_name: applizor-backend-prod
    restart: always
    env_file:
      - ./backend/.env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://applizor:${DB_PASSWORD:-applizor123}@postgres:5432/applizor_erp?schema=public
      PORT: 5000
      GOTENBERG_URL: http://gotenberg:3000
    ports:
      - "${API_PORT:-5000}:5000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      gotenberg:
        condition: service_started
    networks:
      - applizor-network

  # Gotenberg
  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: applizor-gotenberg
    restart: always
    ports:
      - "8000:3000"
    command:
      - "gotenberg"
      - "--chromium-disable-javascript=true"
      - "--chromium-allow-list=file:///tmp/.*"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - applizor-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
      args:
        - NEXT_PUBLIC_API_URL=${API_URL:-http://localhost:5000/api}
    image: applizor-frontend-prod:latest
    container_name: applizor-frontend-prod
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:5000/api}
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      - backend
    networks:
      - applizor-network

volumes:
  postgres_data:
  uploads:

networks:
  applizor-network:
    driver: bridge
