name: Node.js CI

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Execute Server-Side Build & Deploy
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.APPLIZOR_IP }}
        username: ${{ secrets.APPLIZOR_USERNAME }}
        key: ${{ secrets.APPLIZOR_PEM_KEY }}
        command_timeout: 40m
        script: |
          set -e
          echo "🚀 Starting Deployment Process..."
          
          TARGET_DIR="/home/admin/web/iam.applizor.com/public_html"
          REPO_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/applizor/applizor-erp.git"
          
          # 1. Take recursive ownership for the SSH user to allow git/docker operations
          if [ -d "$TARGET_DIR" ]; then
            echo "🔧 Taking ownership for deployment user..."
            sudo chown -R $USER:$USER $TARGET_DIR
          else
            echo "Creating target directory..."
            sudo mkdir -p $TARGET_DIR
            sudo chown -R $USER:$USER $TARGET_DIR
          fi

          # Fix Git Dubious Ownership
          git config --global --add safe.directory $TARGET_DIR || true
          
          cd $TARGET_DIR
          
          # 2. Git Synchronization
          if [ ! -d ".git" ]; then
            echo "📁 .git not found. Performing fresh clone..."
            cd ..
            sudo rm -rf public_html/* public_html/.* 2>/dev/null || true
            git clone $REPO_URL public_html
            cd public_html
          else
            echo "🔄 Repository found. Updating..."
            git remote set-url origin $REPO_URL
            git fetch origin main
            git reset --hard origin/main
          fi
          
          echo "🧹 Safely cleaning up old dangling images..."
          sudo docker image prune -f || true

          # 3. Docker Orchestration
          echo "📦 Starting Docker build..."
          sudo docker compose -f docker-compose.prod.yml up -d --build
          
          echo "⏳ Syncing Static Assets for Nginx (Fixing 404s)..."
          sleep 5
          sudo rm -rf $TARGET_DIR/.next/static $TARGET_DIR/_next/static $TARGET_DIR/public
          sudo mkdir -p $TARGET_DIR/.next $TARGET_DIR/_next
          sudo docker cp applizor-frontend-prod:/app/.next/static $TARGET_DIR/.next/ || echo "Retrying static sync..."
          sudo docker cp applizor-frontend-prod:/app/public $TARGET_DIR/ || echo "Retrying public sync..."
          sudo cp -r $TARGET_DIR/.next/static $TARGET_DIR/_next/ || true

          echo "⏳ Waiting for database and services to stabilize..."
          sleep 10
          for i in {1..30}; do
            if sudo docker compose -f docker-compose.prod.yml exec -T postgres pg_isready -U applizor -d applizor_erp > /dev/null 2>&1; then
              echo "✅ Database is ready!"
              break
            fi
            sleep 2
          done
          
          echo "🧹 Cleaning up any failed custom payment link migration if exists..."
          sudo docker compose -f docker-compose.prod.yml exec -T postgres psql -U applizor -d applizor_erp -c "DELETE FROM _prisma_migrations WHERE migration_name = '20260714132856_add_custom_payment_url' AND finished_at IS NULL;" || true

          # 4. Database Migrations
          echo "🔄 Running migrations..."
          sudo docker compose -f docker-compose.prod.yml exec -T backend npx prisma migrate deploy
          
          # 4b. Wait for backend container to be healthy
          echo "⏳ Waiting for backend container to be ready..."
          for i in {1..30}; do
            if sudo docker compose -f docker-compose.prod.yml exec -T backend node -e "process.exit(0)" > /dev/null 2>&1; then
              echo "✅ Backend container is ready!"
              break
            fi
            sleep 2
          done

          # 4c. Seeding Agent Roles
          echo "🌱 Seeding agent roles and permissions..."
          sudo docker compose -f docker-compose.prod.yml exec -T backend node dist/src/scripts/seed_agent_roles.js || echo "⚠️ Seed script failed (non-critical), continuing..."

          # 4d. Restoring Sanket Employee
          echo "🔧 Restoring Sanket Employee record..."
          sudo docker compose -f docker-compose.prod.yml exec -T backend node dist/src/scripts/restore_sanket.js || echo "⚠️ Restore failed"
          
          # 5. Finalize Permissions: Give control back to the 'admin' user
          echo "🔐 Final permission sweep for admin user..."
          sudo chown -R admin:admin $TARGET_DIR
          sudo chmod -R 777 $TARGET_DIR
          
          echo "✅ DEPLOYMENT SUCCESSFUL!"
