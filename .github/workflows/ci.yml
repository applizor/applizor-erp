name: Node.js CI

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Execute Server-Side Build & Deploy
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.APPLIZOR_IP }}
        username: ${{ secrets.APPLIZOR_USERNAME }}
        key: ${{ secrets.APPLIZOR_PEM_KEY }}
        command_timeout: 40m
        script: |
          set -e
          echo "🚀 Starting Deployment Process..."
          
          TARGET_DIR="/home/admin/web/iam.applizor.com/public_html"
          REPO_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/applizor/applizor-erp.git"
          
          # Fix Git Dubious Ownership
          git config --global --add safe.directory $TARGET_DIR || true
          
          if [ ! -d "$TARGET_DIR" ]; then
            echo "Creating target directory..."
            sudo mkdir -p $TARGET_DIR
            sudo chown -R $USER:$USER $TARGET_DIR
          fi

          cd $TARGET_DIR
          
          if [ ! -d ".git" ]; then
            echo "📁 .git not found. Performing fresh clone..."
            cd ..
            sudo rm -rf public_html/* public_html/.* 2>/dev/null || true
            git clone $REPO_URL public_html
            cd public_html
          else
            echo "🔄 Repository found. Updating..."
            git remote set-url origin $REPO_URL
            git fetch origin main
            git reset --hard origin/main
          fi
          
          echo "Syncing permissions for admin..."
          sudo chown -R admin:admin $TARGET_DIR
          sudo chmod -R 777 $TARGET_DIR

          echo "🧹 Freed up RAM..."
          sudo docker system prune -af --volumes || true

          echo "📦 Starting Docker build..."
          sudo docker compose -f docker-compose.prod.yml up -d --build
          
          echo "⏳ Syncing Static Assets for Nginx/HestiaCP..."
          sudo mkdir -p $TARGET_DIR/.next
          sudo docker cp applizor-frontend-prod:/app/.next/static $TARGET_DIR/.next/static || echo "Waiting for assets..."
          sudo docker cp applizor-frontend-prod:/app/public $TARGET_DIR/public || echo "Waiting for public..."

          echo "⏳ Waiting for database and services to stabilize..."
          sleep 10
          for i in {1..30}; do
            if sudo docker compose -f docker-compose.prod.yml exec -T postgres pg_isready -U applizor -d applizor_erp > /dev/null 2>&1; then
              echo "✅ Database is ready!"
              break
            fi
            sleep 2
          done
          
          echo "🔄 Syncing Migration History with Restored Data..."
          # Since you restored a full database, Prisma's internal history is behind the actual schema.
          # We mark the latest migrations as already applied so Prisma doesn't try to re-run 'ALTER TABLE'
          # which would fail because columns/tables already exist.
          sudo docker compose -f docker-compose.prod.yml exec -T backend npx prisma migrate resolve --applied 20260218190518_add_company_off_days || true
          sudo docker compose -f docker-compose.prod.yml exec -T backend npx prisma migrate resolve --applied 20260219153640_add_payroll_accounting_fields || true
          sudo docker compose -f docker-compose.prod.yml exec -T backend npx prisma migrate resolve --applied 20260219184312_add_advanced_pm_hierarchy || true
          
          echo "🔄 Finalizing Migration Deployment..."
          sudo docker compose -f docker-compose.prod.yml exec -T backend npx prisma migrate deploy
          
          echo "🔐 Final permission sweep for admin user..."
          sudo chown -R admin:admin $TARGET_DIR
          sudo chmod -R 775 $TARGET_DIR
          
          echo "✅ DEPLOYMENT SUCCESSFUL!"
