name: Node.js CI

on: [push, workflow_dispatch]

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Execute Server-Side Build & Deploy
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.APPLIZOR_IP }}
        username: ${{ secrets.APPLIZOR_USERNAME }}
        key: ${{ secrets.APPLIZOR_PEM_KEY }}
        command_timeout: 40m
        script: |
          echo "🚀 Starting High-Speed Server-Side Build & Deployment..."
          
          TARGET_DIR="/home/admin/web/iam.applizor.com/public_html"
          REPO_URL="git@github.com:applizor/applizor-erp.git"
          
          # Handle empty server or missing .git
          if [ ! -d "$TARGET_DIR/.git" ]; then
            echo "📁 .git directory not found. Performing fresh clone..."
            # Create directory if it doesn't exist
            mkdir -p $TARGET_DIR
            # Enter parent directory to clone into the target folder
            cd $TARGET_DIR/..
            # Remove any existing files to avoid clone conflicts
            sudo rm -rf public_html/* public_html/.* 2>/dev/null || true
            git clone $REPO_URL public_html
            cd $TARGET_DIR
          else
            echo "🔄 .git directory found. Fetching latest changes..."
            cd $TARGET_DIR
            git fetch origin main
            git reset --hard origin/main
          fi
          
          # Build and Start services locally
          echo "Building and starting containers locally..."
          sudo docker compose -f docker-compose.prod.yml up -d --build
          
          # Wait for database
          echo "Waiting for database to be ready..."
          for i in {1..30}; do
            if sudo docker compose -f docker-compose.prod.yml exec -T postgres pg_isready -U applizor -d applizor_erp > /dev/null 2>&1; then
              echo "Database is accepting connections!"
              break
            fi
            echo "Database starting up, waiting 2 seconds..."
            sleep 2
          done
          sleep 2
          
          # Apply Prisma migrations
          echo "Running Prisma migrations..."
          sudo docker compose -f docker-compose.prod.yml exec -T backend npx prisma migrate deploy
          
          # Clean up old docker images
          sudo docker system prune -f
          
          echo "✅ Server-Side Build Deployment completed successfully!"
